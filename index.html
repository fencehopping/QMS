<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum Medical Patient Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <button class="sidebar-overlay" id="sidebarOverlay" type="button" aria-label="Close navigation"></button>
      <aside class="sidebar" id="sidebar">
        <div class="brand-row">
          <img
            class="brand-logo"
            src="./logo.png"
            alt="Quantum Medical"
          />
        </div>

        <nav class="nav-list" aria-label="Portal navigation">
          <button class="nav-item" data-route="home" type="button" hidden></button>
          <button class="nav-item" data-route="browse-shoes" type="button" hidden></button>
          <button class="nav-item" data-route="profile" type="button"></button>
          <button class="nav-item" data-route="aob" type="button" hidden></button>
          <button class="nav-item" data-route="orders" type="button"></button>
          <button class="nav-item nav-item--muted" data-route="records" type="button" hidden></button>
          <button class="nav-item nav-item--muted" data-route="invoices" type="button" hidden></button>
          <button class="nav-item nav-item--muted" data-route="support" type="button"></button>
          <button class="nav-item nav-item--muted" data-route="security" type="button"></button>
          <button class="nav-item nav-item--muted" data-route="signout" type="button"></button>
        </nav>
      </aside>

      <main class="main-panel">
        <section class="page-frame">
          <div class="page-header">
            <div class="page-header__meta">
              <button class="menu-button" id="menuButton" type="button" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
              </button>
              <div class="portal-switcher">
                <label class="sr-only" for="portalViewSelect">Portal View</label>
                <select class="portal-switcher__select" id="portalViewSelect" aria-label="Switch portal view">
                  <option value="patient">Patient Portal</option>
                  <option value="fitter">Fitter Portal</option>
                </select>
              </div>
              <span class="page-eyebrow" id="portalEyebrow">Patient Portal</span>
            </div>
            <div class="page-header__content">
              <div class="page-header__copy">
                <h1 id="pageTitle"></h1>
                <p class="page-subtitle" id="pageSubtitle"></p>
              </div>
              <div class="page-header__actions" id="pageHeaderActions"></div>
            </div>
          </div>
          <div id="pageContent"></div>
        </section>

        <footer class="portal-footer">
          <div class="footer-label" id="footerLabel"></div>
          <div class="footer-rule"></div>
          <div class="footer-brand">
            <img src="./logo.png" alt="" />
            <p>&copy; 2026 Quantum Medical Supply, INC<br />All rights reserved</p>
          </div>
        </footer>
      </main>
    </div>

    <nav class="mobile-tabbar" aria-label="Mobile navigation">
      <button class="mobile-tabbar__item" data-mobile-route="home" type="button" hidden></button>
      <button class="mobile-tabbar__item" data-mobile-route="browse-shoes" type="button" hidden></button>
      <button class="mobile-tabbar__item" data-mobile-route="profile" type="button"></button>
      <button class="mobile-tabbar__item" data-mobile-route="orders" type="button"></button>
    </nav>

    <div class="modal-layer" id="modalLayer" hidden>
      <button class="modal-layer__backdrop" id="modalBackdrop" type="button" aria-label="Close dialog"></button>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-card__header">
          <div>
            <p class="card__eyebrow" id="modalEyebrow">Edit Details</p>
            <h2 id="modalTitle"></h2>
            <p class="modal-card__subtitle" id="modalSubtitle" hidden></p>
          </div>
          <button class="modal-close" id="modalClose" type="button" aria-label="Close dialog">Close</button>
        </div>
        <form class="modal-form" id="modalForm"></form>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
